apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: deployproof-postgresql
  labels:
    {{- include "deployproof.labels" . | nindent 4 }}
spec:
  serviceName: deployproof-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deployproof
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deployproof
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image | quote }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.passwordKey }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - --username={{ .Values.postgresql.user }}
                - --dbname={{ .Values.postgresql.database }}
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
