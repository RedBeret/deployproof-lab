apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployproof-api
  labels:
    {{- include "deployproof.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deployproof
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deployproof
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: deployproof-config
          env:
            - name: APP_VERSION
              value: {{ .Values.application.version | quote }}
            - name: SOURCE_REVISION
              value: {{ .Values.application.sourceRevision | quote }}
            - name: PGHOST
              value: deployproof-postgresql
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: PGUSER
              value: {{ .Values.postgresql.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.passwordKey }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
